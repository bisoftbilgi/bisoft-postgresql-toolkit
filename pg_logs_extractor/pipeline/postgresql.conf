input {
  file {
    path              => ["${PG_LOG_PATHS}"]
    start_position    => "beginning"
    sincedb_path      => "${SINCEDB_PATH}"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}\s+(?:[+-]\d{2}(?::?\d{2})?|UTC)\s+\[\d+\]"
      negate => true
      what   => "previous"
      auto_flush_interval => 1
    }
  }
}

filter {
  # --- STEP 1: METADATA ENRICHMENT ---
  if ![path] and [log][file][path] {
    mutate { replace => { "path" => "%{[log][file][path]}" } }
  }
  grok {
    match => { "path" => ".*/(?<server_id>[^/]+)/(?<filename>[^/]+)$" }
  }
  translate {
    field           => "server_id"
    destination     => "server_meta_json"
    dictionary_path => "/usr/share/logstash/extra/servers.yml"
    fallback        => "{\"cluster_name\":\"unknown\",\"server_name\":\"unknown\",\"server_ip\":\"0.0.0.0\"}"
  }
  json { source => "server_meta_json" target => "server_meta" }
  mutate {
    replace => {
      "cluster_name" => "%{[server_meta][cluster_name]}"
      "server_name"  => "%{[server_meta][server_name]}"
      "server_ip"    => "%{[server_meta][server_ip]}"
    }
    remove_field => ["server_meta_json","server_meta"]
  }

  # --- STEP 2: CORE LOG PARSING ---
  grok {
    match => {
      "message" => [
        '(?m)^%{TIMESTAMP_ISO8601:log_time}\s+(?<tz>(?:[+-]\d{2}(?::?\d{2})?|UTC))\s+\[%{NUMBER:pid}\]\s+user=%{DATA:username},db=%{DATA:database_name}, client_ip=%{DATA:client_ip}\s+app=%{DATA:application_name}\s*(?<log_level>LOG|ERROR|FATAL|PANIC|DETAIL|STATEMENT|WARNING|AUDIT):\s+%{GREEDYDATA:pg_message}$'
      ]
    }
  }

  if "_grokparsefailure" not in [tags] {
    
    # Standardize Timestamp to avoid _dateparsefailure
    mutate { add_field => { "log_time_full" => "%{log_time} %{tz}" } }
    date {
      match    => ["log_time_full", "YYYY-MM-dd HH:mm:ss.SSS Z", "YYYY-MM-dd HH:mm:ss.SSS", "ISO8601"]
      target   => "log_time"
    }

    # --- ROUTE 1: AUTO EXPLAIN (SQL + TEMPLATE + PLAN) ---
    if [pg_message] =~ /duration: \d+\.\d+ ms\s+plan:/ {
      grok {
        match => {
          "pg_message" => '(?m)duration: %{NUMBER:duration_ms} ms\s+plan:\s+Query Text: %{DATA:sql_statement}\s+(?<execution_plan>(?:Aggregate|Group|Scan|Sort|Limit|Join|->|Insert|Update|Delete).*)'
        }
      }
      if [sql_statement] {
        mutate { add_field => { "sql_template" => "%{sql_statement}" } }
        mutate {
          gsub => [
            "sql_template", "\b\d+\b", "?",
            "sql_template", "'[^']+'", "?",
            "execution_plan", "Query Identifier:.*", ""
          ]
        }
      }
      mutate { add_tag => ["auto_explain_log"] }
    }

    # --- ROUTE 2: AUDIT LOGS (pgAudit - Fixed for DDL ,,, format) ---
    else if [pg_message] =~ /^AUDIT:/ {
      grok {
        match => { 
          # DATA type is used here to handle empty fields between commas in DDL logs
          "pg_message" => '(?m)AUDIT:\s+SESSION,%{NUMBER:session_id},%{NUMBER:statement_id},%{WORD:audit_type},%{DATA:command},%{DATA:object_type},%{DATA:object_name},%{GREEDYDATA:statement_text}' 
        }
      }
      mutate { 
        add_tag => ["audit_log"] 
        gsub => ["statement_text", ",<not logged>", ""]
      }
    }

    # --- ROUTE 3: CONNECTION LOGS ---
    else if [pg_message] =~ /^connection|^disconnection|password authentication failed/ {
      if [pg_message] =~ /^connection received:/ { mutate { add_field => { "action" => "connection_received" } } }
      else if [pg_message] =~ /^connection authorized:/ { mutate { add_field => { "action" => "connection" } } }
      else if [pg_message] =~ /^disconnection:/ { mutate { add_field => { "action" => "disconnection" } } }
      else { mutate { add_field => { "action" => "connection_failed" } } }
      mutate { add_tag => ["connection_log"] }
    }

    # --- ROUTE 4: ERROR & FATAL LOGS ---
    else if [log_level] in ["ERROR", "FATAL", "PANIC", "DETAIL"] {
      mutate { 
        add_field => { "error_level" => "%{log_level}" }
        add_tag => ["error_log"] 
      }
    }

    # --- FINAL CLEANUP ---
    mutate {
      strip => ["username", "database_name", "client_ip", "sql_statement", "sql_template", "execution_plan", "pg_message", "statement_text"]
      remove_field => ["log_time_full", "tz", "pid", "@version", "host", "event", "log", "message", "log_level"]
    }
  } else { drop { } }
}

output {
  # 1. AUTO EXPLAIN
  if "auto_explain_log" in [tags] {
    jdbc {
      connection_string => "jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}"
      driver_class => "org.postgresql.Driver"
      driver_jar_path => "${JDBC_JAR}"
      username => "${PG_USER}"
      password => "${PG_PASS}"
      statement => [ "INSERT INTO auto_explain_logs (log_time, username, database_name, client_ip, duration_ms, sql_statement, sql_template, execution_plan, cluster_name, server_name, server_ip, application_name) VALUES (?::timestamptz, ?, ?, ?, ?::double precision, ?, ?, ?, ?, ?, ?, ?)", "log_time", "username", "database_name", "client_ip", "duration_ms", "sql_statement", "sql_template", "execution_plan", "cluster_name", "server_name", "server_ip", "application_name" ]
    }
  }

  # 2. AUDIT LOGS
  if "audit_log" in [tags] {
    jdbc {
      connection_string => "jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}"
      driver_class => "org.postgresql.Driver"
      driver_jar_path => "${JDBC_JAR}"
      username => "${PG_USER}"
      password => "${PG_PASS}"
      statement => [ "INSERT INTO audit_logs (log_time, username, database_name, session_id, statement_id, audit_type, statement_text, command, object_type, object_name, cluster_name, server_name, server_ip, client_ip, application_name) VALUES (?::timestamptz, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)", "log_time","username","database_name","session_id","statement_id","audit_type","statement_text","command","object_type","object_name","cluster_name","server_name","server_ip","client_ip","application_name" ]
    }
  }

  # 3. CONNECTION LOGS
  if "connection_log" in [tags] {
    jdbc {
      connection_string => "jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}"
      driver_class => "org.postgresql.Driver"
      driver_jar_path => "${JDBC_JAR}"
      username => "${PG_USER}"
      password => "${PG_PASS}"
      statement => [ "INSERT INTO connection_logs (log_time, username, database_name, client_ip, action, cluster_name, server_name, server_ip, application_name) VALUES (?::timestamptz, ?, ?, ?, ?, ?, ?, ?, ?)", "log_time","username","database_name","client_ip","action","cluster_name","server_name","server_ip","application_name" ]
    }
  }

  # 4. ERROR LOGS
  if "error_log" in [tags] {
    jdbc {
      connection_string => "jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}"
      driver_class => "org.postgresql.Driver"
      driver_jar_path => "${JDBC_JAR}"
      username => "${PG_USER}"
      password => "${PG_PASS}"
      statement => [ "INSERT INTO error_logs (log_time, username, database_name, client_ip, error_level, message_text, cluster_name, server_name, server_ip, application_name) VALUES (?::timestamptz, ?, ?, ?, ?, ?, ?, ?, ?, ?)", "log_time","username","database_name","client_ip","error_level","pg_message","cluster_name","server_name","server_ip","application_name" ]
    }
  }

  stdout { codec => rubydebug }
}
